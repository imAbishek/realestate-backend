# =============================================================
#  application-prod.properties  —  PRODUCTION overrides
#  Activated when: SPRING_PROFILES_ACTIVE=prod
#
#  ALL secrets below must be set as environment variables
#  on your server/Docker container. Never hardcode them here.
# =============================================================

# ─────────────────────────────────────────────
# MEMORY — reduce footprint on Railway 512MB tier
# ─────────────────────────────────────────────
spring.main.lazy-initialization=true

# ─────────────────────────────────────────────
# SERVER — tighten error responses in prod
# ─────────────────────────────────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ─────────────────────────────────────────────
# DATABASE
# Set these env vars on your DigitalOcean / AWS server:
#   DB_URL        jdbc:postgresql://<host>:5432/realestate_db
#   DB_USERNAME   your_db_user
#   DB_PASSWORD   your_db_password
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Larger pool for prod traffic
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ─────────────────────────────────────────────
# CORS — your real domain(s)
# Set via env var: CORS_ORIGINS=https://yoursite.com,https://admin.yoursite.com
# ─────────────────────────────────────────────
# (resolved from env var in base application.properties)

# ─────────────────────────────────────────────
# LOGGING — minimal in prod
# ─────────────────────────────────────────────
logging.level.com.realestate=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Log to file (Docker: mount /var/log as a volume)
logging.file.name=/var/log/realestate/app.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─────────────────────────────────────────────
# SWAGGER — disable in prod (security best practice)
# Re-enable temporarily for debugging if needed
# ─────────────────────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ─────────────────────────────────────────────
# ACTUATOR — restrict to internal health checks only
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─────────────────────────────────────────────
# SENTRY — error monitoring (OWASP A09).
# Fully inert until SENTRY_DSN is set, so a missing/blank DSN is safe.
# Set on Render:
#   SENTRY_DSN          https://<key>@<org>.ingest.sentry.io/<project>
#   SENTRY_RELEASE      propfind-backend@<git-sha>   (optional, release tracking)
# Only ERROR-level logs become Sentry events (5xx via GlobalExceptionHandler's
# log.error) — 4xx client errors stay out of Sentry (breadcrumbs only).
# send-default-pii=false keeps emails/IPs out of events; traces off = free tier.
# Wire alerts to Teams/email in the Sentry project's Alerts settings.
# ─────────────────────────────────────────────
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.release=${SENTRY_RELEASE:}
sentry.send-default-pii=false
sentry.traces-sample-rate=0.0
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# ─────────────────────────────────────────────
# MinIO — object storage (S3-compatible)
# Set these env vars on your prod server:
#   MINIO_ENDPOINT    http://your-server-ip:9000
#   MINIO_ACCESS_KEY  (choose a strong username — not minioadmin)
#   MINIO_SECRET_KEY  (choose a strong password — min 8 chars)
#   MINIO_BUCKET      property-images
# ─────────────────────────────────────────────
# (all resolved from env vars in base application.properties)
