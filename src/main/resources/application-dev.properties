# =============================================================
#  application-dev.properties  —  LOCAL DEVELOPMENT overrides
#  Activated when: SPRING_PROFILES_ACTIVE=dev  (the default)
# =============================================================

# ─────────────────────────────────────────────
# DATABASE — local PostgreSQL
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/realestate_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate: auto-create tables from entities during early dev
# Switch to 'validate' once you introduce Flyway migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ─────────────────────────────────────────────
# REDIS — local (brew install redis / docker)
# ─────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# ─────────────────────────────────────────────
# JWT — relaxed secret for local only
# ─────────────────────────────────────────────
# Base64-encoded secret (must be ≥32 bytes decoded). Generate new one for prod.
app.jwt.secret=RGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZPbmx5Q2hhbmdlSW5Qcm9kMTIzNA==
app.jwt.access-token-expiry-ms=604800000

# ─────────────────────────────────────────────
# CORS — allow local Next.js dev server
# ─────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ─────────────────────────────────────────────
# EMAIL — use Mailtrap (free sandbox) locally
# Signup at mailtrap.io and paste your SMTP creds below
# ─────────────────────────────────────────────
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password

# ─────────────────────────────────────────────
# LOCAL FILE STORAGE — images saved to disk
# Served at: http://localhost:8080/uploads/**
# ─────────────────────────────────────────────
app.storage.upload-dir=uploads
app.storage.base-url=http://localhost:8080/api

# ─────────────────────────────────────────────
# LOGGING — verbose in dev
# ─────────────────────────────────────────────
logging.level.com.realestate=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ─────────────────────────────────────────────
# Swagger visible on dev
# ─────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
