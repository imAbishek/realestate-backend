# =============================================================
#  application.properties  —  base config (all profiles)
#  Profile-specific files override these values:
#    application-dev.properties   (local development)
#    application-prod.properties  (production server)
#
#  Set active profile via env var:  SPRING_PROFILES_ACTIVE=prod
# =============================================================

spring.application.name=realestate-backend

# Active profile default (override in prod with env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────
server.port=${PORT:8080}

# All API routes are prefixed with /api
server.servlet.context-path=/api

# Show full error details (disable in prod via profile)
server.error.include-message=always
server.error.include-binding-errors=always

# ─────────────────────────────────────────────
# DATABASE — PostgreSQL
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/realestate_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP — built into Spring Boot)
spring.datasource.hikari.pool-name=RealEstatePool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ─────────────────────────────────────────────
# JPA / HIBERNATE
# ─────────────────────────────────────────────
# IMPORTANT: Use 'validate' in prod — Flyway manages the schema
# Use 'update' only during early local development
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Show SQL in logs (set to false in prod)
spring.jpa.show-sql=${SHOW_SQL:false}

# Prevent lazy loading issues in serialization
spring.jpa.open-in-view=false

# ─────────────────────────────────────────────
# FLYWAY — Database migrations
# ─────────────────────────────────────────────
# Flyway picks up migration files from:
#   src/main/resources/db/migration/
# Naming convention:  V1__create_users.sql
#                     V2__create_properties.sql
#                     V3__seed_amenities.sql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ─────────────────────────────────────────────
# CACHING — simple in-memory (no Redis required)
# Switch to redis later by adding spring-boot-starter-data-redis
# and setting spring.cache.type=redis
# ─────────────────────────────────────────────
spring.cache.type=simple

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
# IMPORTANT: In prod, set JWT_SECRET as an env var (min 32 chars)
app.jwt.secret=${JWT_SECRET:ThisIsADefaultSecretKeyChangeItInProductionNow123}
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:86400000}
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}
app.jwt.issuer=realestate-portal

# ─────────────────────────────────────────────
# S3 / MinIO — Image storage
# For MinIO: set MINIO_ENDPOINT to http://your-server:9000
# For AWS S3: leave MINIO_ENDPOINT blank, fill in AWS_* vars
# ─────────────────────────────────────────────
app.aws.access-key=${MINIO_ACCESS_KEY:${AWS_ACCESS_KEY:minioadmin}}
app.aws.secret-key=${MINIO_SECRET_KEY:${AWS_SECRET_KEY:minioadmin}}
app.aws.region=${AWS_REGION:us-east-1}
app.aws.endpoint=${MINIO_ENDPOINT:}
app.aws.public-url=${MINIO_PUBLIC_URL:}
app.aws.s3.bucket-name=${MINIO_BUCKET:${S3_BUCKET:property-images}}

# Max image upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ─────────────────────────────────────────────
# EMAIL — SendGrid SMTP bridge
# ─────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:apikey}
spring.mail.password=${MAIL_PASSWORD:your_sendgrid_api_key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:noreply@yoursite.com}
app.mail.from-name=RealEstate Portal

# ─────────────────────────────────────────────
# CORS — Frontend origins allowed to call this API
# ─────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ─────────────────────────────────────────────
# PAGINATION defaults
# ─────────────────────────────────────────────
app.pagination.default-page-size=20
app.pagination.max-page-size=100

# ─────────────────────────────────────────────
# SWAGGER / OpenAPI
# ─────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ─────────────────────────────────────────────
# ACTUATOR — Health checks (used by Docker/ECS)
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=Real Estate Portal API
info.app.version=1.0.0
