name: Backend CI

# Mandatory gate: every push and PR must compile AND pass the test suite.
# A red build blocks merge — tests are not optional from here on.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Runs `mvn test` (which also compiles). Fails the job on any test failure.
      - name: Compile + test
        run: mvn --batch-mode --no-transfer-progress test
