# ============================================================
#  docker-compose.yml  —  Local development environment
#
#  Starts:
#    - PostgreSQL database
#    - Redis cache
#    - MinIO (local S3-compatible storage for images)
#
#  Run:  docker compose up -d
#  Stop: docker compose down
#
#  The Spring Boot app itself runs outside Docker via your IDE
#  or `./mvnw spring-boot:run` — it connects to these containers.
# ============================================================

version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: realestate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: realestate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (local S3 replacement for image uploads) ────────
  minio:
    image: minio/minio:latest
    container_name: realestate_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API endpoint
      - "9001:9001"   # MinIO web console (open in browser)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
